<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remaining Time UI - Variant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --yellow-bg: #FFC107;
            --yellow-shadow: #E1A900;
            --dark-bg: #0B0B0F;
        }

        body {
            background-color: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        /* Contenedor Principal */
        .card-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background-color: var(--yellow-bg);
            border-radius: 40px;
            padding: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 15px 15px 0px var(--yellow-shadow);
            overflow: hidden;
        }

        .card-container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* Texto Izquierdo */
        .text-content {
            flex: 1;
            z-index: 2;
        }

        .text-content h2 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            color: #000;
            line-height: 1.1;
        }

        .text-content p {
            font-size: 1.1rem;
            color: #333;
            margin: 20px 0 30px 0;
            max-width: 400px;
        }

        .status-badge {
            display: inline-block;
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* Contenedor de Avatares */
        .avatar-group {
            display: flex;
            gap: -20px; /* Para que se solapen un poco si quieres */
            z-index: 2;
        }

        .avatar-group img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid transparent;
            object-fit: cover;
            
            /* Animación inicial */
            opacity: 0;
            transform: scale(0);
            animation: appearBounce 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Retrasos para efecto cascada */
        .avatar-group img:nth-child(1) { animation-delay: 0.2s; }
        .avatar-group img:nth-child(2) { animation-delay: 0.4s; }
        .avatar-group img:nth-child(3) { animation-delay: 0.6s; }

        /* Keyframes de la animación */
        @keyframes appearBounce {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* Efecto Hover en Avatares */
        .avatar-group img:hover {
            transform: translateY(-10px) scale(1.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card-container {
                flex-direction: column;
                text-align: center;
                padding: 40px 20px;
            }
            .text-content h2 { font-size: 2.5rem; }
            .avatar-group { margin-top: 40px; justify-content: center; }
            .avatar-group img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="text-content">
            <h2>Remaining Time</h2>
            <p>It is a long established fact that a reader will distracted by the readable content.</p>
            <div class="status-badge">Countdown Expired !</div>
        </div>

        <div class="avatar-group">
            <img src="img/tp-cr-05.jpg" alt="Cat Avatar">
            <img src="img/tp-cr-04.jpg" alt="Boy Avatar">
            <img src="img/tp-cr-03.jpg" alt="Man Avatar">
        </div>
    </div>

</body>
</html>
